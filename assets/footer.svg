<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&amp;display=swap');
      
      .monospace {
        font-family: 'JetBrains Mono', monospace;
      }
      
      .glow-green {
        fill: #00FF88;
        filter: url(#neon-glow);
      }
      
      .glow-text {
        text-shadow: 0 0 8px rgba(0, 255, 136, 0.6);
      }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      .blinking {
        animation: blink 1.5s infinite;
      }
    </style>

    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020504" />
      <stop offset="100%" stop-color="#070c0a" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="140" fill="url(#bg-grad)" rx="8" stroke="#00FF88" stroke-width="1.5" />

  <!-- Grid overlay -->
  <g opacity="0.04">
    <path d="M 0,20 L 800,20 M 0,40 L 800,40 M 0,60 L 800,60 M 0,80 L 800,80 M 0,100 L 800,100 M 0,120 L 800,120" stroke="#00FF88" stroke-width="0.5" />
    <path d="M 100,0 L 100,140 M 200,0 L 200,140 M 300,0 L 300,140 M 400,0 L 400,140 M 500,0 L 500,140 M 600,0 L 600,140 M 700,0 L 700,140" stroke="#00FF88" stroke-width="0.5" />
  </g>

  <!-- Cyber corners -->
  <path d="M 15 25 L 15 15 L 25 15" fill="none" stroke="#00FF88" stroke-width="2.5" />
  <path d="M 785 25 L 785 15 L 775 15" fill="none" stroke="#00FF88" stroke-width="2.5" />
  <path d="M 15 115 L 15 125 L 25 125" fill="none" stroke="#00FF88" stroke-width="2.5" />
  <path d="M 785 115 L 785 125 L 775 125" fill="none" stroke="#00FF88" stroke-width="2.5" />

  <!-- Outer bounds -->
  <line x1="35" y1="15" x2="765" y2="15" stroke="#00FF88" stroke-width="0.5" opacity="0.3" />
  <line x1="15" y1="35" x2="15" y2="105" stroke="#00FF88" stroke-width="0.5" opacity="0.3" />
  <line x1="785" y1="35" x2="785" y2="105" stroke="#00FF88" stroke-width="0.5" opacity="0.3" />
  <line x1="35" y1="125" x2="765" y2="125" stroke="#00FF88" stroke-width="0.5" opacity="0.3" />

  <!-- Centered Content Statement -->
  <g transform="translate(400, 20)">
    <text x="0" y="25" class="monospace" fill="#888888" font-size="11" font-weight="700" letter-spacing="2" text-anchor="middle">STATUS: SYSTEM DEPLOYMENT SUCCESSFUL</text>
    
    <text x="0" y="55" class="monospace glow-green glow-text" font-size="18" font-weight="800" letter-spacing="1.5" text-anchor="middle">YOUR NEXT HIRE IS ONE MESSAGE AWAY</text>
    
    <text x="0" y="85" class="monospace blinking" fill="#00FF88" font-size="11" font-weight="700" letter-spacing="3" text-anchor="middle">&gt;&gt;&gt; INITIATE_COLLABORATION.EXE &lt;&lt;&lt;</text>
  </g>

  <!-- Tiny visual HUD decorations -->
  <rect x="35" y="117" width="10" height="2" fill="#00FF88" opacity="0.5" />
  <rect x="755" y="117" width="10" height="2" fill="#00FF88" opacity="0.5" />
  <circle cx="400" cy="125" r="2" fill="#00FF88" class="blinking" />
</svg>
