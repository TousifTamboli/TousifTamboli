<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="100%" height="auto">
  <defs>
    <!-- Monospace font import -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&amp;display=swap');
      
      .monospace {
        font-family: 'JetBrains Mono', monospace;
      }
      
      .glow-green {
        fill: #00FF88;
        filter: url(#neon-glow);
      }
      
      .glow-text {
        text-shadow: 0 0 8px rgba(0, 255, 136, 0.6);
      }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.35; }
      }
      
      @keyframes scanline {
        0% { transform: translateY(-260px); }
        100% { transform: translateY(260px); }
      }
      
      @keyframes matrix-fade {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }

      .cursor {
        animation: blink 1s infinite;
      }
      
      .pulsing-grid {
        animation: pulse 4s infinite ease-in-out;
      }
      
      .scanning {
        animation: scanline 8s infinite linear;
      }
    </style>

    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030705" />
      <stop offset="100%" stop-color="#0a0f0d" />
    </linearGradient>

    <!-- Tech Grid Pattern -->
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#00FF88" stroke-width="0.5" opacity="0.08" />
    </pattern>
  </defs>

  <!-- Background Layer -->
  <rect width="800" height="260" fill="url(#bg-grad)" rx="8" stroke="#00FF88" stroke-width="1.5" />
  
  <!-- Cyber Grid -->
  <rect width="800" height="260" fill="url(#grid)" rx="8" class="pulsing-grid" />
  
  <!-- Subtly moving scanline -->
  <line x1="0" y1="0" x2="800" y2="0" stroke="#00FF88" stroke-width="1.5" opacity="0.05" class="scanning" />

  <!-- Cyber Corners & HUD Borders -->
  <!-- Top-Left Corner -->
  <path d="M 15 35 L 15 15 L 35 15" fill="none" stroke="#00FF88" stroke-width="3" />
  <rect x="20" y="20" width="4" height="4" fill="#00FF88" />
  
  <!-- Top-Right Corner -->
  <path d="M 785 35 L 785 15 L 765 15" fill="none" stroke="#00FF88" stroke-width="3" />
  <rect x="776" y="20" width="4" height="4" fill="#00FF88" />
  
  <!-- Bottom-Left Corner -->
  <path d="M 15 225 L 15 245 L 35 245" fill="none" stroke="#00FF88" stroke-width="3" />
  
  <!-- Bottom-Right Corner -->
  <path d="M 785 225 L 785 245 L 765 245" fill="none" stroke="#00FF88" stroke-width="3" />

  <!-- Outer HUD lines -->
  <line x1="45" y1="15" x2="755" y2="15" stroke="#00FF88" stroke-width="0.5" opacity="0.3" />
  <line x1="15" y1="45" x2="15" y2="215" stroke="#00FF88" stroke-width="0.5" opacity="0.3" />
  <line x1="785" y1="45" x2="785" y2="215" stroke="#00FF88" stroke-width="0.5" opacity="0.3" />
  <line x1="45" y1="245" x2="755" y2="245" stroke="#00FF88" stroke-width="0.5" opacity="0.3" />

  <!-- Left Cyber Panel: Telemetry Status -->
  <g transform="translate(40, 45)">
    <!-- Tech status header -->
    <text x="0" y="15" class="monospace" fill="#888888" font-size="10" letter-spacing="2">SYSTEM STATUS: OPERATIONAL</text>
    <rect x="0" y="22" width="180" height="2" fill="#00FF88" opacity="0.3" />
    
    <!-- Status parameters -->
    <text x="0" y="45" class="monospace" fill="#888888" font-size="12">CORE.VERSION ..... <tspan fill="#00FF88">2.0.6</tspan></text>
    <text x="0" y="65" class="monospace" fill="#888888" font-size="12">SHIELD_STATUS .... <tspan fill="#00FF88">ACTIVE</tspan></text>
    <text x="0" y="85" class="monospace" fill="#888888" font-size="12">MEM_LOAD ......... <tspan fill="#00FF88">0.42 / 1.00</tspan></text>
    <text x="0" y="105" class="monospace" fill="#888888" font-size="12">LATENCY .......... <tspan fill="#00FF88">14 ms</tspan></text>
    
    <!-- Mini grid design -->
    <rect x="0" y="125" width="180" height="40" fill="none" stroke="#00FF88" stroke-width="0.5" opacity="0.3" />
    <path d="M 10 145 Q 30 130 50 145 T 90 145 T 130 135 T 170 145" fill="none" stroke="#00FF88" stroke-width="1.5" class="glow-green" opacity="0.8" />
    <text x="5" y="160" class="monospace" fill="#00FF88" font-size="8" opacity="0.6">REALTIME TELEMETRY</text>
  </g>

  <!-- Center Panel: The Main Cyber Title -->
  <g transform="translate(270, 75)">
    <!-- Glowing Tech Bracket Left -->
    <path d="M -15 -10 L -30 -10 L -30 90 L -15 90" fill="none" stroke="#00FF88" stroke-width="1.5" opacity="0.7" />
    <line x1="-30" y1="40" x2="-20" y2="40" stroke="#00FF88" stroke-width="2" />

    <!-- Big Name -->
    <text x="0" y="45" class="monospace glow-green glow-text" font-size="52" font-weight="800" letter-spacing="4">TOUSIF</text>
    
    <!-- Role sub-bar -->
    <text x="5" y="75" class="monospace" fill="#FFFFFF" font-size="14" font-weight="700" letter-spacing="3">FULL STACK ARCHITECT</text>
    <text x="5" y="92" class="monospace" fill="#888888" font-size="10" letter-spacing="1">DECENTRALIZED &amp; INTELLIGENT SYSTEMS</text>

    <!-- Glowing Tech Bracket Right -->
    <path d="M 235 -10 L 250 -10 L 250 90 L 235 90" fill="none" stroke="#00FF88" stroke-width="1.5" opacity="0.7" />
    <line x1="250" y1="40" x2="240" y2="40" stroke="#00FF88" stroke-width="2" />
  </g>

  <!-- Right Panel: Matrix Console Mockup -->
  <g transform="translate(580, 45)">
    <!-- Header -->
    <text x="0" y="15" class="monospace" fill="#888888" font-size="10" letter-spacing="2">CONSOLE_LOGS</text>
    <rect x="0" y="22" width="180" height="2" fill="#00FF88" opacity="0.3" />

    <!-- Terminal logs -->
    <text x="0" y="45" class="monospace" fill="#00FF88" font-size="10" opacity="0.8">> initializing core...</text>
    <text x="0" y="60" class="monospace" fill="#00FF88" font-size="10" opacity="0.8">> neural_net.connect()</text>
    <text x="0" y="75" class="monospace" fill="#00FF88" font-size="10" opacity="0.9">> status: 200 OK</text>
    <text x="0" y="90" class="monospace" fill="#00FF88" font-size="10" opacity="0.9">> loading agent_api_v3</text>
    <text x="0" y="105" class="monospace" fill="#00FF88" font-size="10" opacity="1">> sys.listen_port(443)</text>
    <text x="0" y="120" class="monospace" fill="#FFFFFF" font-size="10">> compile success <tspan fill="#00FF88" class="cursor">█</tspan></text>
    
    <!-- Tech data badge -->
    <rect x="0" y="135" width="180" height="30" fill="#0a0f0d" stroke="#00FF88" stroke-width="0.5" opacity="0.5" />
    <text x="10" y="153" class="monospace" fill="#00FF88" font-size="9" font-weight="700">PORTFOLIO // ONLINE</text>
    <circle cx="160" cy="150" r="4" fill="#00FF88" class="cursor" />
  </g>

  <!-- Bottom Details Bar -->
  <line x1="40" y1="225" x2="760" y2="225" stroke="#00FF88" stroke-width="0.5" opacity="0.3" />
  <text x="40" y="238" class="monospace" fill="#888888" font-size="9" letter-spacing="1">LOC: 23.8103° N, 90.4125° E (DHAKA, BD)</text>
  <text x="650" y="238" class="monospace" fill="#00FF88" font-size="9" letter-spacing="1">BUILDING FUTURES</text>
</svg>
