<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 40" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&amp;display=swap');
      .label-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 16px;
        font-weight: 700;
        fill: #00FF88;
        filter: url(#neon-glow);
        letter-spacing: 2px;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      .blinking {
        animation: blink 1.5s infinite;
      }
    </style>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Cyber Bracket Left -->
  <path d="M 12 10 L 4 10 L 4 30 L 12 30" fill="none" stroke="#00FF88" stroke-width="1.5" opacity="0.8" />
  <!-- Text -->
  <text x="24" y="26" class="label-text">// SYSTEM_DIAGNOSTICS</text>
  <!-- Cyber Line Right -->
  <line x1="282.6" y1="20" x2="790" y2="20" stroke="#00FF88" stroke-width="0.5" opacity="0.3" />
  <rect x="790" y="18" width="4" height="4" fill="#00FF88" class="blinking" />
</svg>