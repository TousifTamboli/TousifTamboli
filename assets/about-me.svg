<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      
      .monospace {
        font-family: 'JetBrains Mono', monospace;
      }
      
      .glow-green {
        filter: url(#neon-glow);
      }
      
      .glow-text {
        text-shadow: 0 0 5px rgba(0, 255, 136, 0.5);
      }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.2; }
      }
      
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .blinking {
        animation: blink 1s infinite;
      }
      
      .rotating {
        transform-origin: 670px 90px;
        animation: rotate 12s linear infinite;
      }
      
      .rotating-reverse {
        transform-origin: 670px 90px;
        animation: rotate 8s linear infinite reverse;
      }
    </style>

    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020504" />
      <stop offset="100%" stop-color="#070c0a" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="180" fill="url(#bg-grad)" rx="8" stroke="#00FF88" stroke-width="1" opacity="0.6" />

  <!-- Grid overlay -->
  <g opacity="0.03">
    <path d="M 0,30 L 800,30 M 0,60 L 800,60 M 0,90 L 800,90 M 0,120 L 800,120 M 0,150 L 800,150" stroke="#00FF88" stroke-width="0.5" />
    <path d="M 133,0 L 133,180 M 266,0 L 266,180 M 400,0 L 400,180 M 533,0 L 533,180 M 666,0 L 666,180" stroke="#00FF88" stroke-width="0.5" />
  </g>

  <!-- Section Title -->
  <rect x="0" y="0" width="800" height="28" fill="#050a08" stroke="#00FF88" stroke-width="0.5" opacity="0.8" />
  <circle cx="15" cy="14" r="4" fill="#00FF88" class="blinking" />
  <text x="30" y="18" class="monospace" fill="#00FF88" font-size="10" font-weight="700" letter-spacing="1">USER_CONSOLE // IDENTITY_LOG</text>

  <!-- Left: CLI Prompts -->
  <g transform="translate(30, 45)">
    <text x="0" y="15" class="monospace" fill="#00FF88" font-size="11" font-weight="700">$ whoami</text>
    <text x="15" y="32" class="monospace" fill="#ffffff" font-size="11">Tousif Tamboli — Full Stack Architect &amp; System Designer.</text>
    
    <text x="0" y="55" class="monospace" fill="#00FF88" font-size="11" font-weight="700">$ specialization</text>
    <text x="15" y="72" class="monospace" fill="#ffffff" font-size="11">Distributed Systems, Event-Driven Architectures, &amp; AI-Agent Workflows.</text>

    <text x="0" y="95" class="monospace" fill="#00FF88" font-size="11" font-weight="700">$ core_philosophy</text>
    <text x="15" y="112" class="monospace" fill="#888888" font-size="11" font-style="italic">"Clean code. Dirty deadlines. Zero excuses."</text>
    <text x="15" y="127" class="monospace" fill="#888888" font-size="10">Automate everything. Code cleanly. Let system metrics prove the quality.</text>
  </g>

  <!-- Right: Decorative Core Processor HUD Graphic -->
  <g>
    <!-- Outer Ring -->
    <circle cx="670" cy="90" r="45" fill="none" stroke="#122a1f" stroke-width="1.5" />
    <circle cx="670" cy="90" r="40" fill="none" stroke="#00FF88" stroke-width="1.5" stroke-dasharray="10 15" opacity="0.3" class="rotating" />
    <circle cx="670" cy="90" r="35" fill="none" stroke="#00FF88" stroke-width="1" stroke-dasharray="4 8" opacity="0.5" class="rotating-reverse" />
    
    <!-- Core -->
    <circle cx="670" cy="90" r="22" fill="#050a08" stroke="#00FF88" stroke-width="1.5" class="glow-green" />
    <circle cx="670" cy="90" r="8" fill="#00FF88" class="blinking glow-green" />
    
    <!-- Tech ticks -->
    <line x1="670" y1="35" x2="670" y2="40" stroke="#00FF88" stroke-width="1.5" />
    <line x1="670" y1="140" x2="670" y2="145" stroke="#00FF88" stroke-width="1.5" />
    <line x1="615" y1="90" x2="620" y2="90" stroke="#00FF88" stroke-width="1.5" />
    <line x1="720" y1="90" x2="725" y2="90" stroke="#00FF88" stroke-width="1.5" />
  </g>
</svg>
