<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      
      .monospace {
        font-family: 'JetBrains Mono', monospace;
      }
      
      .glow-green {
        filter: url(#neon-glow);
      }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.2; }
      }

      .blinking {
        animation: blink 1.5s infinite;
      }
      
      .project-card {
        fill: #040906;
        stroke: #00FF88;
        stroke-width: 0.5;
        rx: 4px;
        transition: stroke-width 0.3s;
      }
      
      .project-card:hover {
        stroke-width: 1.5;
      }
    </style>

    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020504" />
      <stop offset="100%" stop-color="#070c0a" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="url(#bg-grad)" rx="8" stroke="#00FF88" stroke-width="1" opacity="0.6" />

  <!-- Grid overlay -->
  <g opacity="0.03">
    <path d="M 0,40 L 800,40 M 0,80 L 800,80 M 0,120 L 800,120 M 0,160 L 800,160 M 0,200 L 800,200 M 0,240 L 800,240" stroke="#00FF88" stroke-width="0.5" />
    <path d="M 100,0 L 100,280 M 200,0 L 200,280 M 300,0 L 300,280 M 400,0 L 400,280 M 500,0 L 500,280 M 600,0 L 600,280 M 700,0 L 700,280" stroke="#00FF88" stroke-width="0.5" />
  </g>

  <!-- Title HUD bar -->
  <rect x="0" y="0" width="800" height="28" fill="#050a08" stroke="#00FF88" stroke-width="0.5" opacity="0.8" />
  <circle cx="15" cy="14" r="4" fill="#00FF88" class="blinking" />
  <text x="30" y="18" class="monospace" fill="#00FF88" font-size="10" font-weight="700" letter-spacing="1">ARCHITECTURAL_SHOWCASE // SELECTED_WORKS</text>

  <!-- Project 1: GovGuideBot -->
  <g transform="translate(30, 45)">
    <rect width="355" height="100" class="project-card" opacity="0.8" />
    <text x="15" y="25" class="monospace" fill="#00FF88" font-size="12" font-weight="700">01 // GOVGUIDEBOT</text>
    <circle cx="330" cy="20" r="4" fill="#00FF88" class="blinking glow-green" />
    <text x="15" y="45" class="monospace" fill="#ffffff" font-size="10">AI Citizen Document Navigation &amp; Retrieval</text>
    <text x="15" y="65" class="monospace" fill="#888888" font-size="9">Next.js / LangChain / Pinecone / OpenAI</text>
    <text x="15" y="82" class="monospace" fill="#00FF88" font-size="9">[ DEPLOYED ] &gt; Click to inspect terminal</text>
  </g>

  <!-- Project 2: UR Automation Suite -->
  <g transform="translate(415, 45)">
    <rect width="355" height="100" class="project-card" opacity="0.8" />
    <text x="15" y="25" class="monospace" fill="#00FF88" font-size="12" font-weight="700">02 // UR AUTOMATION SUITE</text>
    <circle cx="330" cy="20" r="4" fill="#00FF88" class="blinking glow-green" />
    <text x="15" y="45" class="monospace" fill="#ffffff" font-size="10">High-throughput System Automated Task Runner</text>
    <text x="15" y="65" class="monospace" fill="#888888" font-size="9">Node.js / Puppeteer / Redis / Docker</text>
    <text x="15" y="82" class="monospace" fill="#00FF88" font-size="9">[ STABLE ] &gt; Click to inspect terminal</text>
  </g>

  <!-- Project 3: NoCode DB Builder -->
  <g transform="translate(30, 160)">
    <rect width="355" height="100" class="project-card" opacity="0.8" />
    <text x="15" y="25" class="monospace" fill="#00FF88" font-size="12" font-weight="700">03 // NOCODE DB BUILDER</text>
    <circle cx="330" cy="20" r="4" fill="#00FF88" class="blinking glow-green" />
    <text x="15" y="45" class="monospace" fill="#ffffff" font-size="10">Direct UI-to-Schema Dynamic DB &amp; Viewer</text>
    <text x="15" y="65" class="monospace" fill="#888888" font-size="9">React / PostgreSQL / Prisma / Tailwind</text>
    <text x="15" y="82" class="monospace" fill="#00FF88" font-size="9">[ ACTIVE ] &gt; Click to inspect terminal</text>
  </g>

  <!-- Project 4: Quantum ERP System -->
  <g transform="translate(415, 160)">
    <rect width="355" height="100" class="project-card" opacity="0.8" />
    <text x="15" y="25" class="monospace" fill="#00FF88" font-size="12" font-weight="700">04 // QUANTUM ERP SYSTEM</text>
    <circle cx="330" cy="20" r="4" fill="#00FF88" class="blinking glow-green" />
    <text x="15" y="45" class="monospace" fill="#ffffff" font-size="10">Enterprise Resource Planning Micro-Frontends</text>
    <text x="15" y="65" class="monospace" fill="#888888" font-size="9">React / NestJS / PostgreSQL / Redis</text>
    <text x="15" y="82" class="monospace" fill="#00FF88" font-size="9">[ PRODUCTION ] &gt; Click to inspect terminal</text>
  </g>
</svg>
